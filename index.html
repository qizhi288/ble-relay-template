<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XHTKJ BLE Relay</title>
<style>
body {
  font-family: Arial;
  padding: 30px;
}
button {
  font-size: 20px;
  padding: 15px;
}
#status {
  margin-top:20px;
}
</style>
</head>

<body>

<h2>XHTKJ BLE Relay</h2>

<button onclick="connectBLE()">连接设备</button>
<button onclick="testToy()">测试</button>
  
<div id="status">
等待连接...
</div>


<script>

let device;
let server;
let service;

let writeChar;
let notifyChar;


// XHTKJ 真实 UUID
const SERVICE_UUID = '0000ff10-0000-1000-8000-00805f9b34fb';
const WRITE_UUID = '0000ff12-0000-1000-8000-00805f9b34fb';


function log(text){
    document.getElementById("status").innerHTML = text;
}


async function connectBLE(){

try{

log("正在搜索 XHTKJ...");

device = await navigator.bluetooth.requestDevice({
    filters:[
        {
            name:"XHTKJ"
        }
    ],
    optionalServices:[
        SERVICE_UUID
    ]
});


log("正在连接...");

server = await device.gatt.connect();


service = await server.getPrimaryService(SERVICE_UUID);


writeChar = await service.getCharacteristic(WRITE_UUID);




log("✅ XHTKJ 已连接<br>AE01/AE02 已找到");


}
catch(e){

console.log(e);

log(
"❌ 连接失败: "
+ JSON.stringify(e)
);

}


}

async function sendCommand(hex){

    let bytes = hex.match(/.{1,2}/g)
        .map(x => parseInt(x,16));

    await writeChar.writeValueWithResponse(
        new Uint8Array(bytes)
    );

}


async function testToy(){

    let cmd =
    "0312f300fc4000fcff000000fc40003fb3000000";

    await sendCommand(cmd);

    log("✅ 测试指令已发送");

}
async function pollCloud(){

console.log("轮询中");
  
    try{

        const res = await fetch(
            "https://ble-relay-template-production-8ad4.up.railway.app/toy-next?secret=123456"
        );

        const data = await res.json();

        if(data.command){

            console.log(
              "收到云端命令:",
              data.command
            );

            if(data.command.action === "intensity"){

                await sendCommand(
                "0312f300fc4000fcff000000fc40003fb3000000"
                );

            }

            if(data.command.action === "stop"){

                await sendCommand(
                "0312000000000000000000000000000000000000"
                );

            }

        }

    }catch(e){

        console.log(e);

    }

}  
  async function sendCommand(hex){

    let bytes = hex.match(/.{1,2}/g)
        .map(x => parseInt(x,16));

    await writeChar.writeValueWithResponse(
        new Uint8Array(bytes)
    );

    log("✅ 指令已发送");
}


async function testToy(){

    let cmd =
    "0312f300fc4000fcff000000fc40003fb3000000";

    await sendCommand(cmd);

}
</script>

</body>
</html>
